<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>soksak API 테스터</title>
    <style>
        body { font-family: sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; line-height: 1.5; }
        h1 { font-size: 20px; }
        section { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 16px 0; }
        h2 { font-size: 15px; margin: 0 0 12px; }
        label { display: block; font-size: 13px; color: #555; margin-top: 8px; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 6px 8px; margin-top: 2px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 12px; padding: 8px 14px; border: 0; border-radius: 4px; background: #4a6cf7; color: #fff; cursor: pointer; }
        button:hover { background: #3a5ce0; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
        .token { font-size: 12px; color: #2a7; word-break: break-all; }
        .muted { color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <h1>soksak API 테스터</h1>
    <p class="muted">현재 토큰: <span id="tokenStatus" class="token">없음</span>
        <button type="button" onclick="clearToken()" style="background:#999;padding:2px 8px;margin:0 0 0 8px;">토큰 비우기</button>
    </p>

    <section>
        <h2>1. 회원가입 (POST /signup)</h2>
        <label>이메일</label><input id="su_email" value="test@test.com">
        <label>아이디 (영문/숫자 4~20)</label><input id="su_loginId" value="testuser1">
        <label>닉네임</label><input id="su_nickname" value="테스터">
        <label>비밀번호</label><input id="su_password" type="password" value="pass1234">
        <button onclick="signup()">가입</button>
    </section>

    <section>
        <h2>2. 로그인 (POST /auth/login)</h2>
        <label>아이디</label><input id="li_loginId" value="testuser1">
        <label>비밀번호</label><input id="li_password" type="password" value="pass1234">
        <button onclick="login()">로그인 (토큰 저장)</button>
    </section>

    <section>
        <h2>3. 캐릭터 생성 (POST /characters)</h2>
        <label>이름</label><input id="ch_name" value="철수">
        <label>설명</label><input id="ch_description" value="동네 친구">
        <label>페르소나</label><textarea id="ch_persona" rows="2">친근하고 장난스러운 말투</textarea>
        <button onclick="createCharacter()">캐릭터 생성</button>
    </section>

    <section>
        <h2>4. 캐릭터 목록 (GET /characters)</h2>
        <button onclick="listCharacters()">전체 목록</button>
        <button onclick="myCharacters()" style="background:#777;">내 캐릭터</button>
    </section>

    <section>
        <h2>5. 챗룸 생성 (POST /chatrooms)</h2>
        <label>characterId</label><input id="cr_characterId" value="1">
        <button onclick="createChatRoom()">챗룸 생성</button>
    </section>

    <h2>응답</h2>
    <pre id="out">여기에 응답이 표시됩니다.</pre>

<script>
    const out = document.getElementById('out');
    const tokenStatus = document.getElementById('tokenStatus');

    function showToken() {
        const t = localStorage.getItem('accessToken');
        tokenStatus.textContent = t ? t.slice(0, 24) + '…' : '없음';
    }
    function clearToken() { localStorage.removeItem('accessToken'); showToken(); }
    showToken();

    async function call(method, url, body, auth) {
        const headers = { 'Content-Type': 'application/json' };
        if (auth) {
            const t = localStorage.getItem('accessToken');
            if (!t) { out.textContent = '⚠️ 토큰이 없습니다. 먼저 로그인하세요.'; return null; }
            headers['Authorization'] = 'Bearer ' + t;
        }
        try {
            const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
            const text = await res.text();
            let parsed;
            try { parsed = JSON.stringify(JSON.parse(text), null, 2); } catch { parsed = text; }
            out.textContent = `${method} ${url}\n→ ${res.status} ${res.statusText}\n\n${parsed || '(빈 응답)'}`;
            return res.ok ? (text ? JSON.parse(text) : {}) : null;
        } catch (e) {
            out.textContent = '❌ 요청 실패: ' + e.message + '\n(서버가 켜져 있는지 확인하세요)';
            return null;
        }
    }

    function val(id) { return document.getElementById(id).value; }

    function signup() {
        call('POST', '/signup', {
            email: val('su_email'), loginId: val('su_loginId'),
            nickname: val('su_nickname'), password: val('su_password')
        }, false);
    }

    async function login() {
        const data = await call('POST', '/auth/login',
            { loginId: val('li_loginId'), password: val('li_password') }, false);
        if (data && data.accessToken) {
            localStorage.setItem('accessToken', data.accessToken);
            showToken();
        }
    }

    function createCharacter() {
        call('POST', '/characters', {
            name: val('ch_name'), description: val('ch_description'), persona: val('ch_persona')
        }, true);
    }

    function listCharacters() { call('GET', '/characters', null, true); }
    function myCharacters() { call('GET', '/characters/me', null, true); }

    function createChatRoom() {
        call('POST', '/chatrooms', { characterId: Number(val('cr_characterId')) }, true);
    }
</script>
</body>
</html>
