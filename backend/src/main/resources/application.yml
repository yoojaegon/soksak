spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/soksak
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  issuer: soksak
  secret-key: IE8SEbMtNMJpUm5orEUveXx5hGmgSnYjymjdZ1i/CsE=
  access-token-expiration: 3600000      # 1h (ms)
  refresh-token-expiration: 1209600000  # 14d (ms)