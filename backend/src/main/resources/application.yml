spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/soksak
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  issuer: soksak
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration: 3600000      # 1h (ms)
  refresh-token-expiration: 1209600000  # 14d (ms)

ai-server:
  base-url: http://localhost:8000   # FastAPI(uvicorn) 기본 포트
  connect-timeout: 3000             # 연결 타임아웃 (ms)
  read-timeout: 30000               # 응답 대기 (ms) — LLM 호출이라 길게
  internal-auth-secret: ${INTERNAL_AUTH_SECRET}