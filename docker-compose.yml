services:
  postgres:
    image: postgres:16-alpine
    container_name: soksak-postgres
    environment:
      POSTGRES_DB: soksak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - soksak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soksak"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  soksak-pgdata: